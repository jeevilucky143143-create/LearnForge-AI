version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pdf2course_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pdf2course
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdf2course"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdf2course_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/pdf2course
      - SUPABASE_URL=https://your-project.supabase.co
      - SUPABASE_SERVICE_ROLE_KEY=your-supabase-service-role-key
      - SUPABASE_JWT_SECRET=your-supabase-jwt-secret
      - SUPABASE_STORAGE_BUCKET=pdfs
      - GROQ_API_KEY=your-groq-api-key
      - GROQ_MODEL=llama-3.3-70b-versatile
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:18-alpine
    container_name: pdf2course_ui
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_SUPABASE_URL=https://your-project.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=your-supabase-anon-key
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
